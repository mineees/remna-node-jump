services:
  remnanode:
    image: remnawave/node:latest
    restart: unless-stopped
    container_name: remnanode
    network_mode: host
    env_file:
      - ./.env
    volumes:
      - ./remnanode/volume:/var/log/xray
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

  snitch:
    build: ./snitch
    restart: unless-stopped
    container_name: snitch
    network_mode: host
    env_file:
      - ./.env
    command: >
      sh -c "python main.py"
    volumes:
      - ./snitch:/snitch
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - remnanode

  filebeat:
    user: root
    image: docker.elastic.co/beats/filebeat:9.3.0
    restart: unless-stopped
    container_name: filebeat
    env_file:
      - ./.env
    volumes:
      - ./filebeat/volume:/usr/share/filebeat/data
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./remnanode/volume:/var/log/remnanode:ro
      - ./snitch/volume:/var/log/snitch:ro
    depends_on:
      - snitch
