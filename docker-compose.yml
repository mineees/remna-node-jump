services:
  remnanode:
    image: remnawave/node:latest
    restart: unless-stopped
    hostname: remnanode
    container_name: remnanode
    network_mode: host
    env_file: ./.env
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

  python:
    build: ./snitch
    restart: unless-stopped
    container_name: python
    env_file: ./.env
    command: >
      sh -c "python main.py"
    volumes:
      - ./snitch:/snitch
      - /var/run/docker.sock:/var/run/docker.sock
