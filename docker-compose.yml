services:
  python:
    tty: true
    image: python:3.11.14-alpine3.23
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./snitch:/snitch
    command: >
      sh -c "python /snitch/main.py"

  python_2:
    tty: true
    build: ./snitch_old
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./snitch_old:/snitch_old
    command: >
      sh -c "python /snitch_old/main.py"
