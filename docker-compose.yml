services:
  remnanode:
    image: remnawave/node:latest
    restart: unless-stopped
    hostname: remnanode
    container_name: remnanode
    network_mode: host
    env_file: ./remnanode/.env
    volumes:
      - ./remnanode/volume:/var/log/xray
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

  snitch:
    build: ./snitch
    restart: unless-stopped
    hostname: snitch
    container_name: snitch
    network_mode: host
    env_file: ./snitch/.env
    command: >
      sh -c "python main.py"
    volumes:
      - ./snitch:/snitch
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - remnanode
